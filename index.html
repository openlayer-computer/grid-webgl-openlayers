<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid-webgl-openlayers</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.4.0/ol.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #map { width: 100%; height: 100%; }
      #toolbar {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 10;
        background: rgba(255, 255, 255, 0.92);
        padding: 12px 16px;
        border-radius: 8px;
        font: 13px/1.5 system-ui, sans-serif;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        max-width: 280px;
      }
      #toolbar h1 { font-size: 15px; margin-bottom: 8px; }
      #toolbar label { display: flex; align-items: center; gap: 8px; margin: 6px 0; cursor: pointer; }
      #info { margin-top: 8px; color: #444; font-size: 12px; }
      #fps {
        position: absolute;
        top: 12px;
        right: 12px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.72);
        color: #0f0;
        padding: 6px 12px;
        border-radius: 6px;
        font: 13px/1.4 ui-monospace, "Cascadia Code", monospace;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        min-width: 120px;
        text-align: center;
      }
      #fps[data-level="ok"] { color: #ff0; }
      #fps[data-level="low"] { color: #f80; }
      #fps[data-level="idle"] { color: #888; }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="fps">-- FPS</div>
    <div id="toolbar">
      <h1>网格 WebGL 色斑图</h1>
      <div style="font-size:12px;margin-top:4px">投影:</div>
      <label><input type="radio" name="proj" id="proj-4326" checked /> EPSG:4326</label>
      <label><input type="radio" name="proj" id="proj-3857" /> EPSG:3857</label>
      <div id="info">加载中…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
